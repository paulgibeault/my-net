---
# ansible/playbooks/provision-node.yml
# Bootstrap a fresh Ubuntu Server 24.04 LTS node as a PDS host.
#
# Usage:
#   ansible-playbook playbooks/provision-node.yml -i inventory/hosts.yml
#   ansible-playbook playbooks/provision-node.yml -i inventory/hosts.yml --limit pds-primary

- name: Provision PDS node
  hosts: pds_nodes
  become: true
  gather_facts: true

  pre_tasks:
    - name: Assert Ubuntu 24.04
      assert:
        that: ansible_distribution == "Ubuntu" and ansible_distribution_version == "24.04"
        fail_msg: "This playbook targets Ubuntu 24.04 LTS. Got: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  roles:
    - role: base          # OS hardening, UFW, Docker, Tailscale
    - role: litestream    # Litestream binary + systemd service
    - role: pds           # PDS Docker Compose stack
    - role: gatekeeper    # PDS Gatekeeper 2FA proxy

  post_tasks:
    - name: Verify PDS health endpoint
      uri:
        url: "https://{{ pds_domain }}/xrpc/_health"
        status_code: 200
        timeout: 30
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: PDS is healthy
      debug:
        msg: "✅ PDS at {{ pds_domain }} is up and responding."
