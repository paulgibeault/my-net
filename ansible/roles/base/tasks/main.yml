---
# roles/base/tasks/main.yml
# OS hardening, Docker, UFW, Tailscale

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - ufw
      - fail2ban
      - unattended-upgrades
      - iproute2
      - htop
      - jq
    state: present

# ─── UFW ──────────────────────────────────────────────────────────────────────
# Block everything by default. Only allow SSH on the Tailscale interface.
# Cloudflare Tunnel handles all public traffic — no inbound ports needed.

- name: UFW — set default policies
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: UFW — allow SSH on Tailscale interface only
  ufw:
    rule: allow
    interface: tailscale0
    direction: in
    proto: tcp
    port: "22"

- name: UFW — enable
  ufw:
    state: enabled
    logging: "on"

# ─── Docker ───────────────────────────────────────────────────────────────────

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker is running
  service:
    name: docker
    state: started
    enabled: true

- name: Add ansible user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# ─── Automatic security updates ───────────────────────────────────────────────

- name: Configure unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";
    mode: "0644"
