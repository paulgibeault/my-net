---
# roles/litestream/tasks/main.yml
# Install Litestream and configure real-time SQLite replication to MinIO.

- name: Get latest Litestream version
  uri:
    url: https://api.github.com/repos/benbjohnson/litestream/releases/latest
    return_content: true
  register: litestream_release

- name: Set Litestream version fact
  set_fact:
    litestream_version: "{{ (litestream_release.json.tag_name | regex_replace('^v', '')) }}"

- name: Download Litestream binary
  get_url:
    url: "https://github.com/benbjohnson/litestream/releases/download/v{{ litestream_version }}/litestream-v{{ litestream_version }}-linux-amd64.tar.gz"
    dest: /tmp/litestream.tar.gz
    mode: "0644"

- name: Extract Litestream binary
  unarchive:
    src: /tmp/litestream.tar.gz
    dest: /usr/local/bin/
    remote_src: true
    creates: /usr/local/bin/litestream

- name: Ensure Litestream is executable
  file:
    path: /usr/local/bin/litestream
    mode: "0755"

- name: Create Litestream config directory
  file:
    path: /etc/litestream
    state: directory
    mode: "0750"
    owner: root

- name: Template Litestream config
  template:
    src: litestream.yml.j2
    dest: /etc/litestream/litestream.yml
    mode: "0640"
    owner: root

- name: Template Litestream systemd service
  template:
    src: litestream.service.j2
    dest: /etc/systemd/system/litestream.service
    mode: "0644"

- name: Enable and start Litestream
  systemd:
    name: litestream
    state: started
    enabled: true
    daemon_reload: true
