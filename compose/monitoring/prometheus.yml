global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []   # TODO: configure alertmanager if needed

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets:
          - "pds-primary.tailnet.ts.net:9100"   # adjust to your Tailscale hostnames
          - "pds-replica.tailnet.ts.net:9100"

  - job_name: pds_health
    metrics_path: /xrpc/_health
    scheme: https
    static_configs:
      - targets:
          - "your-community.example.com"
